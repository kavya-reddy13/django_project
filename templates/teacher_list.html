{% extends 'base.html' %}
{% block content %}
    
<h2>Teacher Records</h2>

<a href="/teacher/add/" class="btn">Add Teacher</a>

<table>
<tr>
<th>ID</th>
<th>Name</th>
<th>Subject</th>
<th>Phone</th>
<th>Action</th>
</tr>

{% for i in data %}
<tr>
<td>{{ i.id }}</td>
<td>{{ i.name }}</td>
<td>{{ i.subject }}</td>
<td>{{ i.phone }}</td>
<td>
<a href="/teacher/edit/{{ i.id }}/">Edit</a>
<a href="/teacher/delete/{{ i.id }}/">Delete</a>
</td>
</tr>
{% endfor %}

</table>

{% endblock %}
