{% extends 'base.html' %}
{% block content %}
    
<h2>Student Records</h2>

<a href="/students/add/" class="btn">Add Student</a>

<table>
<tr>
<th>ID</th>
<th>Name</th>
<th>Course</th>
<th>Phone</th>
<th>Action</th>
</tr>

{% for i in data %}
<tr>
<td>{{ i.id }}</td>
<td>{{ i.first_name }}</td>
<td>{{ i.course }}</td>
<td>{{ i.phone }}</td>
<td>
<a href="/students/edit/{{ i.id }}/">Edit</a>
<a href="/students/delete/{{ i.id }}/">Delete</a>
</td>
</tr>
{% endfor %}

</table>

{% endblock %}
